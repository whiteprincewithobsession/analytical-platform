name: airflow_platform

services:
  airflow-postgres:
    image: postgres:16
    container_name: airflow_metadata
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB}
    volumes:
      - ./airflow/postgres:/var/lib/postgresql/data
    ports:
      - "0.0.0.0:5433:5432"
    networks:
      - retail_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_POSTGRES_USER} -d ${AIRFLOW_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-init:
    image: apache/airflow:2.9.3
    container_name: airflow_init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER}:${AIRFLOW_POSTGRES_PASSWORD}@airflow-postgres:5432/${AIRFLOW_POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: '${AIRFLOW_FERNET_KEY}'
      _PIP_ADDITIONAL_REQUIREMENTS: >
        apache-airflow-providers-postgres==5.7.1
        apache-airflow-providers-amazon==8.13.0
        apache-airflow-providers-apache-spark==4.11.3
        boto3==1.29.7
        psycopg2-binary==2.9.9
        pandas==2.1.3
        pyarrow==14.0.1
        s3fs==2023.12.0
        requests==2.31.0
        clickhouse-driver==0.2.6
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./spark/jobs/ddl:/opt/spark/jobs/ddl:ro
    entrypoint: /bin/bash
    command: >
      -c "
      airflow db migrate &&
      airflow users create --username ${AIRFLOW_WWW_USERNAME} --password ${AIRFLOW_WWW_PASSWORD} --firstname Admin --lastname Admin --role Admin --email admin@example.com || true &&
      airflow connections add 'spark_default' --conn-type 'spark' --conn-host 'spark://spark-master' --conn-port '7077' --conn-extra '{\"deploy-mode\": \"client\"}' 2>/dev/null || true &&
      airflow variables set incremental_watermark '' 2>/dev/null || true &&
      airflow variables set load_tables '' 2>/dev/null || true &&
      echo 'Airflow DB initialized and user created'
      "
    depends_on:
      airflow-postgres:
        condition: service_healthy
    networks:
      - retail_network
    restart: "no"

  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: airflow_webserver
    ports:
      - "0.0.0.0:8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER}:${AIRFLOW_POSTGRES_PASSWORD}@airflow-postgres:5432/${AIRFLOW_POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: '${AIRFLOW_FERNET_KEY}'
      AIRFLOW__WEBSERVER__SECRET_KEY: '${SUPERSET_SECRET_KEY}'
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      _PIP_ADDITIONAL_REQUIREMENTS: >
        apache-airflow-providers-postgres==5.7.1
        apache-airflow-providers-amazon==8.13.0
        apache-airflow-providers-apache-spark==4.11.3
        boto3==1.29.7
        psycopg2-binary==2.9.9
        pandas==2.1.3
        pyarrow==14.0.1
        s3fs==2023.12.0
        requests==2.31.0
        clickhouse-driver==0.2.6
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./spark/jobs/ddl:/opt/spark/jobs/ddl:ro
    entrypoint: /bin/bash
    command: >
      -c "
      rm -f /opt/airflow/airflow-webserver.pid &&
      airflow webserver
      "
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - retail_network
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: airflow_scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER}:${AIRFLOW_POSTGRES_PASSWORD}@airflow-postgres:5432/${AIRFLOW_POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: '${AIRFLOW_FERNET_KEY}'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      _PIP_ADDITIONAL_REQUIREMENTS: >
        apache-airflow-providers-postgres==5.7.1
        apache-airflow-providers-amazon==8.13.0
        apache-airflow-providers-apache-spark==4.11.3
        boto3==1.29.7
        psycopg2-binary==2.9.9
        pandas==2.1.3
        pyarrow==14.0.1
        s3fs==2023.12.0
        requests==2.31.0
        clickhouse-driver==0.2.6
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./spark/jobs/ddl:/opt/spark/jobs/ddl:ro
    entrypoint: /bin/bash
    command: >
      -c "
      rm -f /opt/airflow/airflow-scheduler.pid &&
      airflow scheduler
      "
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - retail_network
    restart: unless-stopped

  airflow-triggerer:
    image: apache/airflow:2.9.3
    container_name: airflow_triggerer
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER}:${AIRFLOW_POSTGRES_PASSWORD}@airflow-postgres:5432/${AIRFLOW_POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: '${AIRFLOW_FERNET_KEY}'
      AIRFLOW__CORE__DEFAULT_TASK_EXECUTION_TIMEOUT: 3600
      _PIP_ADDITIONAL_REQUIREMENTS: >
        apache-airflow-providers-postgres==5.7.1
        apache-airflow-providers-amazon==8.13.0
        apache-airflow-providers-apache-spark==4.11.3
        boto3==1.29.7
        psycopg2-binary==2.9.9
        pandas==2.1.3
        pyarrow==14.0.1
        s3fs==2023.12.0
        requests==2.31.0
        clickhouse-driver==0.2.6
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./spark/jobs/ddl:/opt/spark/jobs/ddl:ro
    entrypoint: /bin/bash
    command: >
      -c "
      airflow db migrate &&
      airflow triggerer
      "
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - retail_network
    restart: unless-stopped


networks:
  retail_network:
    external: true
    name: analytical_platform_retail_network
