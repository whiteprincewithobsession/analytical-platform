name: spark_cluster

services:
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark_master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "0.0.0.0:7077:7077"
      - "0.0.0.0:8081:8080"
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ./spark/logs:/opt/spark/logs
    environment:
      - SPARK_MASTER_HOST=spark-master
    restart: unless-stopped
    networks:
      retail_network:
        aliases:
          - spark-master

  spark-worker-1:
    image: apache/spark:3.5.1
    container_name: spark_worker_1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "0.0.0.0:8082:8080"
    environment:
      - SPARK_WORKER_WEBUI_PORT=8080
    depends_on:
      - spark-master
    restart: unless-stopped
    networks:
      retail_network:
        aliases:
          - spark_worker_1

  spark-worker-2:
    image: apache/spark:3.5.1
    container_name: spark_worker_2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "0.0.0.0:8083:8080"
    environment:
      - SPARK_WORKER_WEBUI_PORT=8080
    depends_on:
      - spark-master
    restart: unless-stopped
    networks:
      retail_network:
        aliases:
          - spark_worker_2


networks:
  retail_network:
    external: true
    name: analytical_platform_retail_network
