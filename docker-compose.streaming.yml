name: streaming-pipeline

services:
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: streaming-kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
      - "9094:9094"
    environment:
      CLUSTER_ID: "MkU3OjCwTBSQCjMqLbJcYw"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MESSAGE_MAX_BYTES: 10485760
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - streaming-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: streaming-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic orders-events --partitions 3 --replication-factor 1 --config retention.ms=604800000
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic sales-stream --partitions 3 --replication-factor 1 --config retention.ms=604800000
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic user-activity --partitions 3 --replication-factor 1 --config retention.ms=259200000
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic inventory-updates --partitions 2 --replication-factor 1 --config retention.ms=259200000
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic cdc-postgres --partitions 4 --replication-factor 1 --config retention.ms=604800000
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic flink-sink-clickhouse --partitions 3 --replication-factor 1 --config retention.ms=604800000
        kafka-topics --list --bootstrap-server kafka:9092
    networks:
      - streaming-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: streaming-kafka-ui
    ports:
      - "8090:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: marketplace-streaming
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_READONLY: "false"
    depends_on:
      - kafka
    networks:
      - streaming-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  flink-jobmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    image: flink-pyflink:1.18.1
    container_name: streaming-flink-jobmanager
    hostname: flink-jobmanager
    ports:
      - "8084:8081"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1024m
        taskmanager.memory.process.size: 1728m
        taskmanager.numberOfTaskSlots: 4
        state.backend: rocksdb
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        state.savepoints.dir: file:///tmp/flink-savepoints
        execution.checkpointing.interval: 60s
        execution.checkpointing.mode: EXACTLY_ONCE
        execution.checkpointing.min-pause: 30s
        execution.checkpointing.timeout: 10min
        execution.checkpointing.max-concurrent-checkpoints: 1
        restart-strategy: fixed-delay
        restart-strategy.fixed-delay.attempts: 3
        restart-strategy.fixed-delay.delay: 10s
        web.submit.enable: true
        web.cancel.enable: true
        pipeline.max-parallelism: 128
        parallelism.default: 2
    entrypoint: ["bash", "-c", "bash /opt/flink/custom-lib/init-connectors.sh && exec /docker-entrypoint.sh jobmanager"]
    volumes:
      - flink_checkpoints:/tmp/flink-checkpoints
      - flink_savepoints:/tmp/flink-savepoints
      - ./flink/jobs:/opt/flink/usrlib
      - ./flink/connectors:/opt/flink/custom-lib
    networks:
      - streaming-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  flink-taskmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    image: flink-pyflink:1.18.1
    container_name: streaming-flink-taskmanager
    hostname: flink-taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 1728m
        taskmanager.numberOfTaskSlots: 4
        state.backend: rocksdb
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        state.savepoints.dir: file:///tmp/flink-savepoints
        execution.checkpointing.interval: 60s
        execution.checkpointing.mode: EXACTLY_ONCE
        parallelism.default: 2
    entrypoint: ["bash", "-c", "bash /opt/flink/custom-lib/init-connectors.sh && exec /docker-entrypoint.sh taskmanager"]
    volumes:
      - flink_checkpoints:/tmp/flink-checkpoints
      - flink_savepoints:/tmp/flink-savepoints
      - ./flink/jobs:/opt/flink/usrlib
      - ./flink/connectors:/opt/flink/custom-lib
    networks:
      - streaming-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  flink-sql-client:
    image: flink:1.18.1-scala_2.12-java11
    container_name: streaming-flink-sql-client
    hostname: flink-sql-client
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        rest.address: flink-jobmanager
    entrypoint: >
      /bin/bash -c "
        sleep infinity
      "
    volumes:
      - ./flink/jobs:/opt/flink/usrlib
      - ./flink/connectors:/opt/flink/custom-lib
    networks:
      - streaming-network
    profiles:
      - tools
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  kafka_data:
    driver: local
  flink_checkpoints:
    driver: local
  flink_savepoints:
    driver: local

networks:
  streaming-network:
    driver: bridge
    name: streaming-pipeline-network
