server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Superset static assets
    location ^~ /static/ {
        proxy_pass http://superset:8088/static/;
        proxy_set_header Host $host;
        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "" always;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Superset dashboard
    location /superset/ {
        proxy_pass http://superset:8088/superset/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        add_header X-Frame-Options "" always;
        add_header Content-Security-Policy "" always;
    }

    # Superset login page (GET)
    location /login/ {
        proxy_pass http://superset:8088/login/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Frame-Options;
        # Add auto-login script
        sub_filter '</body>' '<script>document.addEventListener("DOMContentLoaded",function(){if(document.querySelector("#username")&&document.querySelector("#password")){document.querySelector("#username").value="admin";document.querySelector("#password").value="admin";document.querySelector("form").submit();}});</script></body>';
        sub_filter_types text/html;
    }

    # Superset API
    location /api/ {
        proxy_pass http://superset:8088/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auto-login page
    location = /superset-login.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
